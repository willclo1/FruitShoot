name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

            # --- backend ---
            cd ~/FruitShoot
            git fetch origin
            git checkout main
            git reset --hard origin/main

            docker compose down
            docker compose up -d --build

            # --- frontend ---
            cd ~/FruitShoot/frontend
            npm install

            # install tmux if missing
            if ! command -v tmux >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y tmux
            fi

            # kill old expo session if exists
            tmux kill-session -t expo || true

            # start new expo dev server in tmux
            tmux new -d -s expo "cd ~/FruitShoot/frontend && npx expo start --tunnel --clear"

            echo "Expo server started in tmux session 'expo'"
          EOF
