name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

            cd ~/FruitShoot
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # ───────── BACKEND (Docker) ─────────
            docker compose down --remove-orphans
            docker compose up -d --build

            docker image prune -af
            docker builder prune -af

            # ───────── ADMIN BUILD ─────────
            echo "Building admin panel..."

            cd ~/FruitShoot/fruitshoot-admin
            npm install
            npm run build

            # ───────── DEPLOY STATIC FILES ─────────
            echo "Deploying admin static files..."

            sudo rm -rf /var/www/fruitshoot-admin
            sudo mkdir -p /var/www/fruitshoot-admin
            sudo cp -r dist/* /var/www/fruitshoot-admin/

            # ───────── FRONTEND (Expo) ─────────
            cd ~/FruitShoot/frontend
            npm install

            if ! command -v tmux >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y tmux
            fi

            chmod +x ~/run_expo.sh

            tmux kill-session -t expo || true
            tmux new-session -d -s expo "~/run_expo.sh"

            echo "Expo server started in tmux"

            echo "Deploy complete"
          EOF
