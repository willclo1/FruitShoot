name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
            set -e

            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

            cd ~/FruitShoot
            git fetch origin
            git checkout main
            git reset --hard origin/main

            docker compose down
            docker compose up -d --build

            cd ~/FruitShoot/frontend
            npm install

            pm2 start ecosystem.config.js --only fruitshoot-expo || pm2 restart fruitshoot-expo --update-env
            pm2 save
          EOF
