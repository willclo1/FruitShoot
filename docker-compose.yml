services:
  mysql:
    image: mysql:8.0
    container_name: fruitshoot-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/data/images:/data/images
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER}",
          "-p${MYSQL_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: fruitshoot-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./database/data/images:/app/database/data/images
    ports:
      - "8000:8000"

  retraining-manifest:
    build: ./backend
    container_name: fruitshoot-retraining-manifest
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./database/data/images:/app/database/data/images
      - ./backend/retraining_outputs:/app/backend/retraining_outputs
    command: python -m scripts.generate_train_data
    profiles:
      - jobs

volumes:
  mysql_data:
